name: Salesforce CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > sfdx_auth_url.txt
          sf org login sfdx-url \
            --sfdx-url-file sfdx_auth_url.txt \
            --alias deployment-org \
            --set-default

      - name: Deploy metadata to Salesforce
        run: |
          sf project deploy start \
            --source-dir force-app/main/default/classes \
            --target-org deployment-org \
            --wait 10

      - name: Clean up auth file
        run: rm sfdx_auth_url.txt